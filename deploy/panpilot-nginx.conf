# PanPilot — nginx reverse proxy
# Deploy: sudo cp deploy/panpilot-nginx.conf /etc/nginx/sites-available/panpilot
#         sudo ln -s /etc/nginx/sites-available/panpilot /etc/nginx/sites-enabled/panpilot
#         sudo certbot --nginx -d panpilot.owncompute.com
#         sudo systemctl reload nginx

server {
    listen 80;
    server_name panpilot.owncompute.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name panpilot.owncompute.com;

    ssl_certificate     /etc/letsencrypt/live/panpilot.owncompute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panpilot.owncompute.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Webhook ingress — externally reachable, Proactivanet posts here.
    # Authentication via X-APIKey header is enforced inside the app.
    location /webhook {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    # Admin UI — HTTP Basic Auth is enforced by the FastAPI app
    # using ADMIN_USERNAME / ADMIN_PASSWORD from .env.
    # Credentials are safe here because they cross the wire only over TLS.
    location /admin {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Block all other paths — the app has no other public surface.
    location / {
        return 404;
    }
}
